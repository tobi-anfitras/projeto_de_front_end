<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" type="txt/css" media="screen" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light d-flex align-items-center vh-100">
    <div class="container">
        <div class="row justify-content center">
        <form id="cadform">
        <div>
                <label for="cadName" class="form-label">nome</label>
                <input type="text" class="form-control" id="cadName" placeholder="nome (minimo 3 letras)" required>
        </div>

        <div class="mb-3">
                <label for="cadEmail" class="form-label">Email</label>
                <input type="email" class="form-control" id="cadEmail" aria-describedby="emailHelp" placeholder="gmail" required>

        <div id="emailHelp" class="form-text">nao compartilhe seu email</div>
        </div>

        <div class="mb-3">
                 <label for="cadSenha" class="form-label">senha</label>
                 <input type="password" class="form-control" id="cadSenha" placeholder="senha" required>

        </div>
       
         <button type="submit" class="btn btn-primary w-100 py-2 mt-3">criar</button>

        <div class="mb-3 form-check">
                <p class="text-muted small">ja possue uma conta? <a href="index.html">entrar</a></p>
        </div>

    </form>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
